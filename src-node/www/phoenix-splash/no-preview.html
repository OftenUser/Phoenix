<!DOCTYPE html>
<html lang="en">
<head>
  <title>Phoenix Live Preview</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    function translate() {
        const urlParams = new URLSearchParams(window.location.search || "");
      
        if (urlParams.get('jsonInput')) {
            let input = JSON.parse(decodeURIComponent(urlParams.get('jsonInput')));
            document.getElementById("heading").textContent = input.heading;
            document.getElementById("details").textContent = input.details;
        }
    }
  </script>
</head>

<body onload="translate();">
<img id="starsLeft" src="images/stars-left.svg" alt="Left Stars" />
<div id="mainDiv" style="top: 50%;">
  <div id="MainText">
    <h1 id="heading">Nothing To Preview!</h1>
    <p id="details">Please select an HTML file to preview.</p>
  </div>
</div>
<img id="cloudLeftTop" src="images/vector-top-left.png" alt="Top Left Clouds" />
<img id="cloudBottomRight" src="images/vector-bottom-right.png" alt="Bottom Right Clouds" />
<img id="starsRight" src="images/stars-right.svg" alt="Right Stars" />
<img class="clouds" style="z-index: 3; transform: translate(0px, -1.55909px);" src="images/cloud1.svg" alt="Bottom Cloud 1" />
<img class="clouds" style="z-index: 6; transform: translate(0px, -2.33863px);" src="images/cloud2.svg" alt="Bottom Cloud 2" />
<img class="clouds" style="z-index: 5; transform: translate(0px, -3.89772px);" src="images/cloud3.svg" alt="Bottom Cloud 3" />
<img class="clouds" style="z-index: 6; transform: translate(0px, -3.89772px);" src="images/cloud4.svg" alt="Bottom Cloud 4" />
</body>
</html>
